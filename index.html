<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HI Serra da Estrela — Gestão Operacional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; }
body { background: #f5f2ed; color: #1a2332; -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ─── CSS VARIABLES ─── */
:root {
  --navy:    #1a2332;
  --navy2:   #243044;
  --cream:   #f5f2ed;
  --cream2:  #ede9e2;
  --gold:    #c9a84c;
  --gold2:   #e8c96a;
  --red:     #c0392b;   --red-bg:    #fdf1f0;  --red-border:    #f5c4c0;
  --amber:   #d4890a;   --amber-bg:  #fef8ee;  --amber-border:  #f5d9a0;
  --green:   #1a7a4a;   --green-bg:  #edf7f2;  --green-border:  #a8d5bb;
  --purple:  #5b4fcf;   --purple-bg: #f0eeff;  --purple-border: #c4bde8;
  --blue:    #1a6fcf;   --blue-bg:   #eef5ff;
  --text:    #1a2332;
  --muted:   #6b7585;
  --border:  #e0dbd3;
  --radius:  10px;
  --shadow:  0 2px 12px rgba(0,0,0,0.08);
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--cream2); border-radius: 10px; }

#app { height: 100vh; display: flex; flex-direction: column; }

/* ═══════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════ */
.login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: var(--navy);
  padding: 24px;
  position: relative; overflow: hidden;
}
.login-screen::before {
  content: ''; position: absolute;
  width: 600px; height: 600px; border-radius: 50%;
  background: rgba(201,168,76,0.06);
  top: -200px; right: -200px;
}
.login-card {
  background: #fff; border-radius: 16px; padding: 40px;
  width: 100%; max-width: 380px;
  position: relative; z-index: 1;
  box-shadow: 0 24px 64px rgba(0,0,0,0.3);
}
.login-logo { margin-bottom: 32px; }
.login-hotel-name { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--navy); }
.login-hotel-sub  { font-size: 13px; color: var(--muted); margin-top: 3px; }

/* ═══════════════════════════════════════════
   FORMS
═══════════════════════════════════════════ */
.form-group { margin-bottom: 16px; }
.form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-label {
  display: block; font-size: 12.5px; font-weight: 500; color: var(--muted);
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;
}
.form-input {
  width: 100%; padding: 10px 13px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; color: var(--text); background: #fff;
  transition: border-color 0.15s; outline: none;
}
.form-input:focus    { border-color: var(--navy); }
.form-input:disabled { background: var(--cream); color: var(--muted); }
.form-error {
  background: var(--red-bg); border: 1px solid var(--red-border);
  color: var(--red); border-radius: 8px; padding: 10px 13px; font-size: 13px; margin-top: 4px;
}
.form-error.hidden { display: none; }

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px; border-radius: 8px;
  border: 1.5px solid var(--border); background: #fff;
  font-size: 13.5px; font-weight: 500; color: var(--text);
  transition: all 0.15s; white-space: nowrap;
}
.btn:hover   { background: var(--cream2); border-color: #ccc; }
.btn:active  { transform: scale(0.98); }
.btn-primary { background: var(--navy); color: #fff; border-color: var(--navy); }
.btn-primary:hover { background: var(--navy2); border-color: var(--navy2); }
.btn-danger  { background: var(--red);  color: #fff; border-color: var(--red); }
.btn-danger:hover  { background: #a93226; border-color: #a93226; }
.btn-login {
  width: 100%; padding: 12px; border: none; border-radius: 8px;
  background: var(--navy); color: #fff; font-size: 15px; font-weight: 500;
  cursor: pointer; margin-top: 4px; transition: background 0.15s;
}
.btn-login:hover    { background: var(--navy2); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-logout {
  padding: 6px 12px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent; color: rgba(255,255,255,0.5);
  font-size: 12px; transition: all 0.15s;
}
.btn-logout:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
.btn-logout-sm {
  padding: 7px 14px; border-radius: 8px;
  border: 1.5px solid var(--border); background: #fff;
  font-size: 13px; font-weight: 500; color: var(--muted); transition: all 0.15s;
}
.btn-logout-sm:hover { background: var(--cream2); }
.btn-delete {
  padding: 5px 9px; border-radius: 7px;
  border: 1.5px solid var(--red-border); background: var(--red-bg);
  color: var(--red); font-size: 13px; transition: all 0.15s; flex-shrink: 0;
}
.btn-delete:hover { background: var(--red); color: #fff; }

/* ═══════════════════════════════════════════
   RECEPTION LAYOUT
═══════════════════════════════════════════ */
.app-layout { display: flex; height: 100vh; overflow: hidden; }

.sidebar {
  width: 230px; background: var(--navy);
  display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
}
.sidebar-header { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.07); }
.hotel-name { font-family: 'DM Serif Display', serif; color: var(--gold); font-size: 17px; line-height: 1.2; }
.hotel-sub  { color: rgba(255,255,255,0.32); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }
.sidebar-nav { flex: 1; padding: 14px 12px; overflow-y: auto; }
.nav-label {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(255,255,255,0.28); padding: 0 8px; margin: 14px 0 5px;
}
.nav-label:first-child { margin-top: 0; }
.nav-item {
  display: flex; align-items: center; gap: 9px;
  width: 100%; padding: 9px 10px; border: none;
  background: transparent; color: rgba(255,255,255,0.52);
  font-size: 13.5px; border-radius: 8px; text-align: left; transition: all 0.15s;
}
.nav-item:hover  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.85); }
.nav-item.active { background: rgba(201,168,76,0.16); color: var(--gold2); }
.nav-icon  { width: 20px; text-align: center; font-size: 15px; flex-shrink: 0; }
.nav-count { margin-left: auto; }
.badge-red { background: var(--red); color: #fff; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; }
.sidebar-footer {
  padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.user-info { display: flex; align-items: center; gap: 9px; min-width: 0; }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--gold); display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: var(--navy); flex-shrink: 0;
}
.user-name { color: rgba(255,255,255,0.75); font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { color: rgba(255,255,255,0.32); font-size: 10.5px; }

.main-content { flex: 1; overflow-y: auto; background: var(--cream); display: flex; flex-direction: column; }

/* ═══════════════════════════════════════════
   CLEANING LAYOUT
═══════════════════════════════════════════ */
.cleaning-layout { display: flex; flex-direction: column; height: 100vh; }
.cleaning-header {
  background: var(--navy); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.cleaning-title    { font-family: 'DM Serif Display', serif; color: var(--gold2); font-size: 18px; }
.cleaning-subtitle { color: rgba(255,255,255,0.45); font-size: 12px; margin-top: 2px; }
.cleaning-layout .main-content { flex: 1; padding: 0; }

/* ═══════════════════════════════════════════
   PAGE STRUCTURE
═══════════════════════════════════════════ */
.view-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 24px 0; flex-shrink: 0;
}
.view-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--navy); }
.view-sub   { font-size: 13px; color: var(--muted); margin-top: 2px; }
.header-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* ═══════════════════════════════════════════
   STATS
═══════════════════════════════════════════ */
.stats-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; padding: 16px 24px;
}
.stat-card { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 13px 16px; }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
.stat-val   { font-size: 26px; font-weight: 600; margin-top: 3px; line-height: 1; }
.stat-red    .stat-val { color: var(--red); }
.stat-amber  .stat-val { color: var(--amber); }
.stat-green  .stat-val { color: var(--green); }
.stat-purple .stat-val { color: var(--purple); }

/* ═══════════════════════════════════════════
   PROGRESS
═══════════════════════════════════════════ */
.progress-section  { padding: 0 24px 16px; }
.cleaning-progress { padding: 14px 20px; border-bottom: 1px solid var(--border); background: #fff; flex-shrink: 0; }
.progress-header   { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--muted); margin-bottom: 7px; font-weight: 500; }
.progress-pct      { font-weight: 600; color: var(--green); }
.progress-bar      { background: var(--cream2); border-radius: 10px; height: 7px; overflow: hidden; }
.progress-fill     { background: linear-gradient(90deg, #1a7a4a, #27ae60); height: 100%; border-radius: 10px; transition: width 0.5s ease; }

/* ═══════════════════════════════════════════
   FILTERS
═══════════════════════════════════════════ */
.filter-bar {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  padding: 12px 24px; background: #fff; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.filter-btn {
  padding: 5px 12px; border-radius: 20px;
  border: 1.5px solid var(--border); background: transparent;
  font-size: 12px; font-weight: 500; color: var(--muted); transition: all 0.15s;
}
.filter-btn:hover  { border-color: var(--navy); color: var(--navy); }
.filter-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
.filter-sep        { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

/* ═══════════════════════════════════════════
   ROOMS GRID
═══════════════════════════════════════════ */
.rooms-content { padding: 16px 24px; flex: 1; }
.floor-section { margin-bottom: 20px; }
.floor-label   { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.rooms-grid    { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 10px; }

.room-card {
  background: #fff; border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 13px 12px;
  cursor: pointer; transition: all 0.15s; position: relative; user-select: none;
}
.room-card:hover  { transform: translateY(-2px); box-shadow: var(--shadow); }
.room-card:active { transform: scale(0.98); }
.room-card.dirty       { border-color: var(--red-border);    background: var(--red-bg); }
.room-card.cleaning    { border-color: var(--amber-border);  background: var(--amber-bg); }
.room-card.clean       { border-color: var(--green-border);  background: var(--green-bg); }
.room-card.maintenance { border-color: var(--purple-border); background: var(--purple-bg); }
.room-card.priority-room { border-width: 2px; }
.room-card.dirty.priority-room    { border-color: var(--red); }
.room-card.cleaning.priority-room { border-color: var(--amber); }
.room-card.clean.priority-room    { border-color: var(--green); }

.priority-flag {
  position: absolute; top: 6px; right: 6px;
  background: var(--amber); color: #fff;
  font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
}
.room-number { font-weight: 700; font-size: 18px; color: var(--navy); line-height: 1; }
.room-type   { font-size: 11px; color: var(--muted); margin-top: 2px; }

.room-status-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 600; margin-top: 9px;
  padding: 3px 7px; border-radius: 20px;
}
.room-status-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
.room-status-badge.dirty       { background: #fce9e8; color: var(--red);    } .room-status-badge.dirty::before       { background: var(--red); }
.room-status-badge.cleaning    { background: #fdefd4; color: var(--amber);  } .room-status-badge.cleaning::before    { background: var(--amber); }
.room-status-badge.clean       { background: #d9f0e6; color: var(--green);  } .room-status-badge.clean::before       { background: var(--green); }
.room-status-badge.maintenance { background: #e4e0f8; color: var(--purple); } .room-status-badge.maintenance::before { background: var(--purple); }

/* ─── NOTA NO CARTÃO ─── */
.room-note-preview {
  margin-top: 8px; padding: 5px 8px;
  background: rgba(255,255,255,0.78);
  border-radius: 6px; border-left: 2px solid var(--gold);
  font-size: 10.5px; color: var(--muted); line-height: 1.35;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.room-note-author {
  display: block; font-weight: 600; color: var(--navy);
  font-size: 10px; margin-bottom: 1px;
}

/* ═══════════════════════════════════════════
   DASHBOARD EXTRAS
═══════════════════════════════════════════ */
.section-header { padding: 4px 24px 12px; display: flex; align-items: center; justify-content: space-between; }
.section-title  { font-size: 14px; font-weight: 600; color: var(--navy); }

.priority-list { padding: 0 24px 16px; display: flex; flex-direction: column; gap: 8px; }
.priority-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--amber-bg); border: 1.5px solid var(--amber-border);
  border-radius: var(--radius); padding: 12px 14px;
  cursor: pointer; transition: all 0.15s;
}
.priority-item:hover { box-shadow: var(--shadow); transform: translateX(2px); }
.priority-badge {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--amber); color: #fff;
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.priority-info { flex: 1; }
.priority-room { font-size: 13.5px; font-weight: 600; }
.priority-note { font-size: 12px; color: var(--muted); margin-top: 1px; }

.buildings-overview { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 4px 24px 24px; }
.building-summary {
  background: #fff; border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  cursor: pointer; transition: all 0.15s;
}
.building-summary:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.building-name { font-weight: 600; font-size: 14px; margin-bottom: 10px; }
.mini-stats { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.mini-stat { font-size: 11.5px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
.mini-stat.red    { background: var(--red-bg);    color: var(--red); }
.mini-stat.amber  { background: var(--amber-bg);  color: var(--amber); }
.mini-stat.green  { background: var(--green-bg);  color: var(--green); }
.mini-stat.purple { background: var(--purple-bg); color: var(--purple); }
.view-link { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* ═══════════════════════════════════════════
   STAFF
═══════════════════════════════════════════ */
.staff-section { padding: 0 24px 8px; }
.staff-section:first-of-type { padding-top: 16px; }
.staff-section-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted);
  margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.staff-empty { font-size: 13px; color: var(--muted); padding: 12px 0; }
.staff-card {
  display: flex; align-items: center; gap: 12px;
  background: #fff; border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 13px 14px; margin-bottom: 8px; transition: all 0.15s;
}
.staff-card:hover { box-shadow: var(--shadow); }
.staff-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--navy); color: #fff;
  font-size: 14px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.staff-info  { flex: 1; min-width: 0; }
.staff-name  { font-size: 14px; font-weight: 600; }
.staff-email { font-size: 12px; color: var(--muted); margin-top: 1px; }
.staff-meta  { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
.you-badge   { background: var(--blue-bg); color: var(--blue); font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px; margin-left: 5px; }

/* ═══════════════════════════════════════════
   NOTAS — PÁGINA
═══════════════════════════════════════════ */
.notes-page { padding: 16px 24px 32px; }

.note-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 10px;
  cursor: pointer; transition: all 0.15s;
}
.note-card:hover { box-shadow: var(--shadow); transform: translateX(2px); }

.note-card-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px; flex-wrap: wrap;
}
.note-room-label { font-weight: 700; font-size: 14px; color: var(--navy); }
.note-building-tag {
  font-size: 10.5px; font-weight: 600; padding: 2px 7px;
  border-radius: 4px; background: var(--cream2); color: var(--muted);
}
.note-card-meta { margin-left: auto; font-size: 11px; color: var(--muted); text-align: right; line-height: 1.5; }
.note-author-name { font-weight: 600; color: var(--navy); display: block; }
.note-card-text { font-size: 13.5px; color: var(--text); line-height: 1.5; }

/* ═══════════════════════════════════════════
   NOTAS — MODAL
═══════════════════════════════════════════ */
.current-note-box {
  background: var(--amber-bg); border: 1.5px solid var(--amber-border);
  border-radius: 8px; padding: 10px 12px; margin-bottom: 10px;
}
.current-note-label {
  font-size: 10px; font-weight: 700; color: var(--amber);
  text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px;
}
.current-note-text { font-size: 13px; color: var(--text); line-height: 1.45; }
.current-note-by   { font-size: 11px; color: var(--muted); margin-top: 5px; }

.note-edit-area { display: flex; gap: 8px; margin-top: 6px; align-items: flex-end; }
.note-textarea {
  flex: 1; padding: 9px 12px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 13.5px; color: var(--text); background: var(--cream);
  outline: none; resize: none;
  transition: border-color 0.15s, background 0.15s;
  font-family: 'DM Sans', sans-serif;
  min-height: 68px; max-height: 130px;
}
.note-textarea:focus { border-color: var(--navy); background: #fff; }
.note-btns { display: flex; flex-direction: column; gap: 6px; }
.btn-save-note {
  padding: 9px 14px; border-radius: 8px;
  background: var(--navy); color: #fff; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: background 0.15s; white-space: nowrap;
}
.btn-save-note:hover    { background: var(--navy2); }
.btn-save-note:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-clear-note {
  padding: 9px 12px; border-radius: 8px;
  background: transparent; color: var(--muted);
  border: 1.5px solid var(--border);
  font-size: 13px; cursor: pointer; transition: all 0.15s;
}
.btn-clear-note:hover { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }

/* ═══════════════════════════════════════════
   TASK CARDS (CLEANING)
═══════════════════════════════════════════ */
.task-group-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted); padding: 14px 20px 8px;
}
.task-group-label.priority-label { color: var(--amber); }

.task-card {
  display: flex; align-items: center; gap: 12px;
  background: #fff; border-top: 1px solid var(--border); padding: 14px 20px; transition: background 0.12s;
}
.task-card:hover { background: var(--cream); }
.task-card.task-priority { border-left: 3px solid var(--amber); background: var(--amber-bg); }
.task-card.task-priority:hover { background: #fef2d8; }

.task-room-num {
  font-family: 'DM Serif Display', serif; font-size: 22px;
  color: var(--navy); min-width: 52px; line-height: 1;
}
.task-building { font-size: 10px; display: block; color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 500; margin-top: 2px; }
.task-info     { flex: 1; min-width: 0; }
.task-type     { font-size: 12.5px; color: var(--muted); }
.task-prio-note { font-size: 12px; color: var(--amber); font-weight: 500; margin-top: 2px; }
.task-note-preview {
  font-size: 11.5px; color: var(--muted); margin-top: 4px;
  border-left: 2px solid var(--gold); padding-left: 6px; font-style: italic;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 1; -webkit-box-orient: vertical;
}
.task-status-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; margin-top: 5px; }
.task-status-badge.dirty    { background: #fce9e8; color: var(--red); }
.task-status-badge.cleaning { background: #fdefd4; color: var(--amber); }

.task-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.task-btn {
  padding: 7px 13px; border-radius: 8px;
  font-size: 12.5px; font-weight: 600; border: none;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.btn-start { background: var(--amber); color: #fff; }
.btn-start:hover { background: #b8780a; }
.btn-done  { background: var(--green); color: #fff; }
.btn-done:hover  { background: #155f38; }
.btn-nota  { background: var(--cream2); color: var(--navy); border: 1.5px solid var(--border); font-size: 11.5px; }
.btn-nota:hover  { background: #ddd8cf; }

.all-done      { text-align: center; padding: 60px 24px; }
.all-done-icon { font-size: 48px; margin-bottom: 12px; }
.all-done-title { font-size: 17px; font-weight: 600; color: var(--navy); }
.all-done-sub   { font-size: 13px; color: var(--muted); margin-top: 4px; }

/* ═══════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════ */
.empty-state {
  text-align: center; padding: 60px 24px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.empty-icon  { font-size: 40px; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--navy); }

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(20,30,46,0.5); z-index: 100;
  backdrop-filter: blur(2px); animation: overlayIn 0.15s ease;
}
.modal-overlay.hidden { display: none; }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

#modal-container {
  position: fixed; inset: 0; z-index: 101;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; pointer-events: none;
}
.modal {
  background: #fff; border-radius: 14px; width: 100%; max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  animation: modalIn 0.18s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: all; max-height: 90vh; overflow-y: auto;
}
.modal.modal-sm { max-width: 340px; }
@keyframes modalIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 0; }
.modal-title  { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--navy); }
.modal-close-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1.5px solid var(--border); background: transparent;
  font-size: 13px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.13s; flex-shrink: 0;
}
.modal-close-btn:hover { background: var(--cream2); }
.modal-body { padding: 14px 20px 20px; }
.modal-info  { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.modal-section-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--muted); margin-bottom: 10px; margin-top: 18px;
}
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

.status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.status-opt {
  padding: 11px 10px; border-radius: 9px;
  border: 1.5px solid var(--border); text-align: center;
  cursor: pointer; transition: all 0.13s;
  font-size: 13px; font-weight: 500; background: #fff;
}
.status-opt:hover { transform: scale(1.02); }
.status-opt.selected { font-weight: 700; }
.status-opt.dirty.selected       { background: var(--red-bg);    border-color: var(--red);    color: var(--red); }
.status-opt.cleaning.selected    { background: var(--amber-bg);  border-color: var(--amber);  color: var(--amber); }
.status-opt.clean.selected       { background: var(--green-bg);  border-color: var(--green);  color: var(--green); }
.status-opt.maintenance.selected { background: var(--purple-bg); border-color: var(--purple); color: var(--purple); }

.toggle-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13.5px; }

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
#toast-container {
  position: fixed; bottom: 20px; right: 20px; z-index: 200;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  background: var(--navy); color: #fff; padding: 11px 16px; border-radius: 10px;
  font-size: 13.5px; font-weight: 500; border-left: 3px solid var(--gold);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2); animation: toastIn 0.2s ease; max-width: 280px;
}
.toast.toast-error { border-left-color: var(--red); }
.toast.fade-out    { animation: toastOut 0.35s ease forwards; }
@keyframes toastIn  { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { to   { transform: translateX(20px); opacity: 0; } }

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 600px) {
  .stats-grid         { grid-template-columns: repeat(2,1fr); padding: 12px 16px; }
  .form-row           { grid-template-columns: 1fr; }
  .buildings-overview { grid-template-columns: 1fr; }
  .rooms-grid         { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .task-actions       { flex-direction: row; }
  .view-header        { padding: 16px 16px 0; flex-wrap: wrap; gap: 10px; }
  .filter-bar         { padding: 10px 16px; }
  .rooms-content      { padding: 12px 16px; }
  .notes-page         { padding: 12px 16px 24px; }
}
/* ═══════════════════════════════════════════
   DAILY REPORT
═══════════════════════════════════════════ */
.report-page { padding: 16px 24px 40px; }
.report-summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 4px; }
.report-summary-card { background:#fff; border:1.5px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
.report-summary-card.s-green { border-color:var(--green-border); background:var(--green-bg); }
.report-summary-card.s-red   { border-color:var(--red-border);   background:var(--red-bg); }
.report-summary-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; font-weight:500; }
.report-summary-val { font-size:28px; font-weight:700; margin-top:3px; color:var(--navy); }
.report-summary-card.s-green .report-summary-val { color:var(--green); }
.report-summary-card.s-red   .report-summary-val { color:var(--red); }
.report-summary-sub { font-size:11.5px; color:var(--muted); margin-top:2px; }
.report-section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin:22px 0 10px; padding-bottom:6px; border-bottom:1.5px solid var(--border); }
.report-staff-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
.report-staff-card { background:#fff; border:1.5px solid var(--border); border-left:3px solid var(--navy); border-radius:var(--radius); padding:14px; }
.report-staff-name { font-weight:700; font-size:14px; color:var(--navy); margin-bottom:6px; }
.report-staff-stat { font-size:12.5px; color:var(--muted); margin-bottom:2px; }
.report-staff-stat strong { color:var(--text); }
.report-bar-wrap { background:var(--cream2); border-radius:6px; height:6px; margin:8px 0 7px; overflow:hidden; }
.report-bar { background:linear-gradient(90deg,#1a7a4a,#27ae60); height:100%; border-radius:6px; }
.report-staff-rooms { font-size:11.5px; color:var(--muted); margin-top:5px; line-height:1.6; }
.report-table { width:100%; border-collapse:collapse; background:#fff; border-radius:var(--radius); overflow:hidden; border:1.5px solid var(--border); font-size:13px; margin-top:4px; }
.report-table th { background:var(--navy); color:#fff; padding:9px 12px; text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; font-weight:600; }
.report-table td { padding:9px 12px; border-bottom:1px solid var(--border); }
.report-table tr:last-child td { border-bottom:none; }
.report-table tr:nth-child(even) td { background:var(--cream); }
.report-uncleaned td { color:var(--red); }
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6b7585;font-size:14px;">
    A carregar...
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ╔═══════════════════════════════════════════════════════╗
// ║   CONFIGURAÇÃO FIREBASE                               ║
// ║   Substitua os valores abaixo pelos do seu projeto    ║
// ╚═══════════════════════════════════════════════════════╝
const firebaseConfig = {
  apiKey: "AIzaSyAe7Z7N2TNuQmZn6jhsZgT7_G6U7G8Tw1A",
  authDomain: "pousada-2-164c4.firebaseapp.com",
  projectId: "pousada-2-164c4",
  storageBucket: "pousada-2-164c4.firebasestorage.app",
  messagingSenderId: "446785879451",
  appId: "1:446785879451:web:ef2bf47182e01b93a5b53e",
  measurementId: "G-19CM0ZTCQJ"
};


firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ═══════════════════════════════
// ESTADO
// ═══════════════════════════════
let currentUser     = null;
let currentUserData = null;
let rooms           = {};
let staffList       = [];
let unsubRooms      = null;
let unsubStaff      = null;
let activeNav       = 'dashboard';
let filterStatus    = 'all';
let filterFloor     = 'all';

const STATUS_LABEL = { dirty:'Sujo', cleaning:'Manutenção', clean:'Limpo', maintenance:'Bloqueado' };
const STATUS_ICON  = { dirty:'🔴',  cleaning:'🟡',       clean:'🟢',   maintenance:'🔧' };

// ═══════════════════════════════
// AUTENTICAÇÃO
// ═══════════════════════════════
auth.onAuthStateChanged(async user => {
  if (user) {
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      if (doc.exists) {
        currentUser     = user;
        currentUserData = { uid: user.uid, ...doc.data() };
        startListeners();
        renderApp();
      } else {
        await auth.signOut();
        renderLogin('Conta não encontrada. Contacte a receção.');
      }
    } catch(e) {
      console.error(e);
      renderLogin('Erro ao carregar dados. Verifique a ligação.');
    }
  } else {
    currentUser     = null;
    currentUserData = null;
    stopListeners();
    renderLogin();
  }
});

async function doLogin(email, password) { await auth.signInWithEmailAndPassword(email, password); }
async function doLogout() { await auth.signOut(); }

// ═══════════════════════════════
// LISTENERS EM TEMPO REAL
// ═══════════════════════════════
function startListeners() {
  stopListeners();

  unsubRooms = db.collection('rooms').onSnapshot(snap => {
    rooms = {};
    snap.forEach(d => { rooms[d.id] = { id: d.id, ...d.data() }; });
    if (document.getElementById('main-content')) renderMainContent();
  }, err => console.error('Rooms error:', err));

  if (currentUserData?.role === 'receptionist') {
    unsubStaff = db.collection('users').onSnapshot(snap => {
      staffList = [];
      snap.forEach(d => { staffList.push({ uid: d.id, ...d.data() }); });
      if (['staff'].includes(activeNav) && document.getElementById('main-content')) renderMainContent();
    }, err => console.error('Staff error:', err));
  }
}

function stopListeners() {
  if (unsubRooms) { unsubRooms(); unsubRooms = null; }
  if (unsubStaff) { unsubStaff(); unsubStaff = null; }
}

// ═══════════════════════════════
// OPERAÇÕES — QUARTOS
// ═══════════════════════════════
async function addRoom(building, number, floor, type) {
  const dup = Object.values(rooms).find(r => r.building === building && r.number.trim() === number.trim());
  if (dup) throw new Error(`Quarto ${number} já existe no Edifício ${building}.`);
  return db.collection('rooms').add({
    building, number: number.trim(), floor: parseInt(floor), type,
    status: 'clean', priority: false, priorityNote: '',
    note: '', noteAuthor: '', noteAuthorId: '', noteUpdatedAt: null,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy: currentUser.uid
  });
}

async function removeRoom(id) { return db.collection('rooms').doc(id).delete(); }

async function setRoomStatus(id, status) {
  return db.collection('rooms').doc(id).update({
    status,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy: currentUser.uid
  });
}

async function setPriority(id, priority, noteText = '') {
  return db.collection('rooms').doc(id).update({
    priority, priorityNote: noteText,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy: currentUser.uid
  });
}

async function setNote(roomId, text) {
  const data = text.trim()
    ? { note: text.trim(), noteAuthor: currentUserData.name, noteAuthorId: currentUser.uid,
        noteUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() }
    : { note: '', noteAuthor: '', noteAuthorId: '',
        noteUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() };
  return db.collection('rooms').doc(roomId).update(data);
}

// ═══════════════════════════════
// OPERAÇÕES — FUNCIONÁRIOS
// ═══════════════════════════════
async function createStaff(name, email, password, role, building) {
  const secApp  = firebase.initializeApp(firebaseConfig, 'sec_' + Date.now());
  const secAuth = secApp.auth();
  try {
    const cred = await secAuth.createUserWithEmailAndPassword(email, password);
    await db.collection('users').doc(cred.user.uid).set({
      name, email, role, building,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await secAuth.signOut();
  } finally { await secApp.delete(); }
}

async function removeStaff(uid) { return db.collection('users').doc(uid).delete(); }

// ═══════════════════════════════
// RENDER — LOGIN
// ═══════════════════════════════
function renderLogin(errorMsg = '') {
  document.getElementById('app').innerHTML = `
    <div class="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <div class="login-hotel-name">HI Serra da Estrela</div>
          <div class="login-hotel-sub">Sistema de Gestão Operacional</div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="l-email" class="form-input" placeholder="email@hotel.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Palavra-passe</label>
          <input type="password" id="l-pass" class="form-input" placeholder="••••••••" autocomplete="current-password">
        </div>
        ${errorMsg ? `<div class="form-error">${escHtml(errorMsg)}</div>` : ''}
        <button class="btn-login" id="l-btn" onclick="handleLogin()">Entrar</button>
      </div>
    </div>`;
  ['l-email','l-pass'].forEach(id => {
    document.getElementById(id)?.addEventListener('keydown', e => { if (e.key==='Enter') handleLogin(); });
  });
}

async function handleLogin() {
  const email = (document.getElementById('l-email')?.value||'').trim();
  const pass  =  document.getElementById('l-pass')?.value||'';
  const btn   =  document.getElementById('l-btn');
  if (!email||!pass) { renderLogin('Preencha o email e a palavra-passe.'); return; }
  if (btn) { btn.textContent='A entrar...'; btn.disabled=true; }
  try { await doLogin(email, pass); }
  catch(err) {
    const map = {
      'auth/user-not-found':     'Email não encontrado.',
      'auth/wrong-password':     'Palavra-passe incorreta.',
      'auth/invalid-email':      'Email inválido.',
      'auth/invalid-credential': 'Email ou palavra-passe incorretos.',
      'auth/too-many-requests':  'Demasiadas tentativas. Aguarde.',
    };
    renderLogin(map[err.code] || 'Erro ao entrar. Tente novamente.');
  }
}

// ═══════════════════════════════
// RENDER — APP SHELL
// ═══════════════════════════════
function renderApp() {
  if (currentUserData.role === 'receptionist') renderReceptionShell();
  else renderCleaningShell();
}

function renderReceptionShell() {
  document.getElementById('app').innerHTML = `
    <div class="app-layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main-content" id="main-content"></main>
    </div>
    <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal()"></div>
    <div id="modal-container"></div>
    <div id="toast-container"></div>`;
  renderSidebar();
  renderMainContent();
}

function renderCleaningShell() {
  const bLabel = currentUserData.building==='both' ? 'Ambos os edifícios' : `Edifício ${currentUserData.building}`;
  document.getElementById('app').innerHTML = `
    <div class="cleaning-layout">
      <header class="cleaning-header">
        <div>
          <div class="cleaning-title">Tarefas de Limpeza</div>
          <div class="cleaning-subtitle">${escHtml(currentUserData.name)} · ${bLabel}</div>
        </div>
        <button class="btn-logout-sm" onclick="doLogout()">Sair</button>
      </header>
      <main class="main-content" id="main-content"></main>
    </div>
    <div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal()"></div>
    <div id="modal-container"></div>
    <div id="toast-container"></div>`;
  renderMainContent();
}

// ═══════════════════════════════
// RENDER — SIDEBAR
// ═══════════════════════════════
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  if (!sb) return;
  const dirtyA = Object.values(rooms).filter(r=>r.building==='A'&&r.status==='dirty').length;
  const dirtyB = Object.values(rooms).filter(r=>r.building==='B'&&r.status==='dirty').length;
  const nNotes = Object.values(rooms).filter(r=>r.note&&r.note.trim()).length;

  sb.innerHTML = `
    <div class="sidebar-header">
      <div class="hotel-name">HI Serra da Estrela</div>
      <div class="hotel-sub">Gestão Operacional</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Visão Geral</div>
      <button class="nav-item ${activeNav==='dashboard'?'active':''}" onclick="navigate('dashboard')">
        <span class="nav-icon">📊</span> Dashboard
      </button>

      <div class="nav-label">Edifícios</div>
      <button class="nav-item ${activeNav==='building-A'?'active':''}" onclick="navigate('building-A')">
        <span class="nav-icon">🏢</span> Edifício Antigo
        <span class="nav-count">${dirtyA>0?`<span class="badge-red">${dirtyA}</span>`:''}</span>
      </button>
      <button class="nav-item ${activeNav==='building-B'?'active':''}" onclick="navigate('building-B')">
        <span class="nav-icon">🏢</span> Edifício Novo
        <span class="nav-count">${dirtyB>0?`<span class="badge-red">${dirtyB}</span>`:''}</span>
      </button>

      <div class="nav-label">Administração</div>
      <button class="nav-item ${activeNav==='staff'?'active':''}" onclick="navigate('staff')">
        <span class="nav-icon">👥</span> Funcionários
      </button>

      <div class="nav-label">Registos</div>
      <button class="nav-item ${activeNav==='notes'?'active':''}" onclick="navigate('notes')">
        <span class="nav-icon">📝</span> Notas
        <span class="nav-count" style="color:rgba(255,255,255,0.45);font-size:11px;font-weight:600;">${nNotes>0?nNotes:''}</span>
      </button>

      <div class="nav-label">Relatórios</div>
      <button class="nav-item ${activeNav==='report'?'active':''}" onclick="navigate('report')">
        <span class="nav-icon">📄</span> Relatório Diário
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">${currentUserData.name.charAt(0).toUpperCase()}</div>
        <div>
          <div class="user-name">${escHtml(currentUserData.name)}</div>
          <div class="user-role">Rececionista</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>`;
}

function navigate(nav) {
  activeNav=nav; filterStatus='all'; filterFloor='all';
  renderSidebar(); renderMainContent();
}

// ═══════════════════════════════
// ROUTER
// ═══════════════════════════════
function renderMainContent() {
  const mc = document.getElementById('main-content');
  if (!mc) return;
  if (currentUserData.role === 'cleaning') { mc.innerHTML = buildCleaningTasks(); return; }
  switch(activeNav) {
    case 'dashboard':  mc.innerHTML = buildDashboard();   break;
    case 'building-A': mc.innerHTML = buildBuilding('A'); break;
    case 'building-B': mc.innerHTML = buildBuilding('B'); break;
    case 'staff':      mc.innerHTML = buildStaff();       break;
    case 'notes':      mc.innerHTML = buildNotes();       break;
    case 'report':     mc.innerHTML = buildReport();       break;
    default:           mc.innerHTML = buildDashboard();
  }
  renderSidebar();
}

// ═══════════════════════════════
// BUILD — DASHBOARD
// ═══════════════════════════════
function buildDashboard() {
  const all = Object.values(rooms);
  const s   = {
    dirty:       all.filter(r=>r.status==='dirty').length,
    cleaning:    all.filter(r=>r.status==='cleaning').length,
    clean:       all.filter(r=>r.status==='clean').length,
    maintenance: all.filter(r=>r.status==='maintenance').length,
  };
  const pct  = all.length ? Math.round(s.clean/all.length*100) : 0;
  const rA   = all.filter(r=>r.building==='A');
  const rB   = all.filter(r=>r.building==='B');
  const prio = all.filter(r=>r.priority&&r.status!=='clean').sort(sortByNum);
  const date = capitalize(new Date().toLocaleDateString('pt-PT',{weekday:'long',year:'numeric',month:'long',day:'numeric'}));

  return `
    <div class="view-header">
      <div><h1 class="view-title">Dashboard</h1><p class="view-sub">${date}</p></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card stat-red">   <div class="stat-label">Sujos</div>      <div class="stat-val">${s.dirty}</div></div>
      <div class="stat-card stat-amber"> <div class="stat-label">Manutenção</div>   <div class="stat-val">${s.cleaning}</div></div>
      <div class="stat-card stat-green"> <div class="stat-label">Limpos</div>     <div class="stat-val">${s.clean}</div></div>
      <div class="stat-card stat-purple"><div class="stat-label">Bloqueado</div> <div class="stat-val">${s.maintenance}</div></div>
    </div>
    <div class="progress-section">
      <div class="progress-header"><span>Progresso geral</span><span class="progress-pct">${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${prio.length>0?`
      <div class="section-header"><h2 class="section-title">⚡ Prioridade Check-in (${prio.length})</h2></div>
      <div class="priority-list">
        ${prio.map(r=>`
          <div class="priority-item" onclick="openRoomModal('${r.id}')">
            <div class="priority-badge">!</div>
            <div class="priority-info">
              <div class="priority-room">Quarto ${escHtml(r.number)} — Edifício ${r.building}</div>
              <div class="priority-note">${escHtml(r.priorityNote||'Check-in prioritário')}</div>
            </div>
            <div class="room-status-badge ${r.status}">${STATUS_LABEL[r.status]}</div>
          </div>`).join('')}
      </div>`:''
    }
    <div class="buildings-overview">
      <div class="building-summary" onclick="navigate('building-A')">
        <div class="building-name">🏢 Edifício Antigo <span style="font-size:12px;color:var(--muted);font-weight:400;">(${rA.length} quartos)</span></div>
        ${buildMiniStats(rA)}<div class="view-link">Ver quartos →</div>
      </div>
      <div class="building-summary" onclick="navigate('building-B')">
        <div class="building-name">🏢 Edifício Novo <span style="font-size:12px;color:var(--muted);font-weight:400;">(${rB.length} quartos)</span></div>
        ${buildMiniStats(rB)}<div class="view-link">Ver quartos →</div>
      </div>
    </div>`;
}

function buildMiniStats(list) {
  const d=list.filter(r=>r.status==='dirty').length;
  const c=list.filter(r=>r.status==='cleaning').length;
  const k=list.filter(r=>r.status==='clean').length;
  const m=list.filter(r=>r.status==='maintenance').length;
  return `<div class="mini-stats">
    ${d?`<span class="mini-stat red">${d} sujo${d>1?'s':''}</span>`:''}
    ${c?`<span class="mini-stat amber">${c} a limpar</span>`:''}
    ${k?`<span class="mini-stat green">${k} limpo${k>1?'s':''}</span>`:''}
    ${m?`<span class="mini-stat purple">${m} manut.</span>`:''}
    ${!d&&!c&&!m?'<span class="mini-stat green">Tudo limpo ✓</span>':''}
  </div>`;
}

// ═══════════════════════════════
// BUILD — EDIFÍCIO
// ═══════════════════════════════
function buildBuilding(b) {
  let list = Object.values(rooms).filter(r=>r.building===b);
  list.sort((a,z)=>a.floor-z.floor||a.number.localeCompare(z.number,undefined,{numeric:true}));
  const floors = [...new Set(list.map(r=>r.floor))].sort((a,z)=>a-z);
  if (filterStatus!=='all') list=list.filter(r=>r.status===filterStatus);
  if (filterFloor!=='all')  list=list.filter(r=>r.floor===parseInt(filterFloor));
  const byFloor={};
  list.forEach(r=>{ (byFloor[r.floor]=byFloor[r.floor]||[]).push(r); });
  const total=Object.values(rooms).filter(r=>r.building===b).length;

  return `
    <div class="view-header">
      <div><h1 class="view-title">Edifício ${b}</h1><p class="view-sub">${total} quarto${total!==1?'s':''} registado${total!==1?'s':''}</p></div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openAddRoomModal('${b}')">+ Adicionar quarto</button>
      </div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn ${filterStatus==='all'?'active':''}"         onclick="setFilter('status','all')">Todos</button>
      <button class="filter-btn ${filterStatus==='dirty'?'active':''}"       onclick="setFilter('status','dirty')">🔴 Sujos</button>
      <button class="filter-btn ${filterStatus==='cleaning'?'active':''}"    onclick="setFilter('status','cleaning')">🟡 A limpar</button>
      <button class="filter-btn ${filterStatus==='clean'?'active':''}"       onclick="setFilter('status','clean')">🟢 Limpos</button>
      <button class="filter-btn ${filterStatus==='maintenance'?'active':''}" onclick="setFilter('status','maintenance')">🔧 Manut.</button>
      <div class="filter-sep"></div>
      <button class="filter-btn ${filterFloor==='all'?'active':''}" onclick="setFilter('floor','all')">Todos os pisos</button>
      ${floors.map(f=>`<button class="filter-btn ${filterFloor==f?'active':''}" onclick="setFilter('floor','${f}')">Piso ${f}</button>`).join('')}
    </div>
    <div class="rooms-content">
      ${Object.keys(byFloor).length===0?`
        <div class="empty-state">
          <div class="empty-icon">🏠</div>
          <div class="empty-title">${total===0?'Nenhum quarto ainda.':'Nenhum quarto neste filtro.'}</div>
          ${total===0?`<button class="btn btn-primary" onclick="openAddRoomModal('${b}')">+ Adicionar quarto</button>`:''}
        </div>`:
        Object.entries(byFloor).map(([floor,fr])=>`
          <div class="floor-section">
            <div class="floor-label">Piso ${floor}</div>
            <div class="rooms-grid">${fr.map(buildRoomCard).join('')}</div>
          </div>`).join('')}
    </div>`;
}

function buildRoomCard(r) {
  const hasNote = r.note && r.note.trim();
  return `
    <div class="room-card ${r.status}${r.priority?' priority-room':''}" onclick="openRoomModal('${r.id}')">
      ${r.priority?`<div class="priority-flag">⚡ Check-in</div>`:''}
      <div class="room-number">${escHtml(r.number)}</div>
      <div class="room-type">${escHtml(r.type)}</div>
      <div class="room-status-badge ${r.status}">${STATUS_LABEL[r.status]}</div>
      ${hasNote?`
        <div class="room-note-preview">
          <span class="room-note-author">${escHtml(r.noteAuthor)}</span>
          ${escHtml(r.note)}
        </div>`:''}
    </div>`;
}

// ═══════════════════════════════
// BUILD — FUNCIONÁRIOS
// ═══════════════════════════════
function buildStaff() {
  const recep    = staffList.filter(s=>s.role==='receptionist');
  const cleaners = staffList.filter(s=>s.role==='cleaning');
  return `
    <div class="view-header">
      <div><h1 class="view-title">Funcionários</h1><p class="view-sub">${staffList.length} registado${staffList.length!==1?'s':''}</p></div>
      <div class="header-actions"><button class="btn btn-primary" onclick="openCreateStaffModal()">+ Novo funcionário</button></div>
    </div>
    <div class="staff-section">
      <div class="staff-section-title">Rececionistas (${recep.length})</div>
      ${recep.length===0?'<div class="staff-empty">Nenhum rececionista registado.</div>':recep.map(buildStaffCard).join('')}
    </div>
    <div class="staff-section" style="margin-top:8px">
      <div class="staff-section-title">Equipa de Limpeza (${cleaners.length})</div>
      ${cleaners.length===0?'<div class="staff-empty">Nenhum membro da limpeza registado.</div>':cleaners.map(buildStaffCard).join('')}
    </div>`;
}

function buildStaffCard(s) {
  const bLabel = s.building==='both'?'Ambos os edifícios':s.building?`Edifício ${s.building}`:'—';
  const isMe   = s.uid===currentUser?.uid;
  return `
    <div class="staff-card">
      <div class="staff-avatar">${s.name.charAt(0).toUpperCase()}</div>
      <div class="staff-info">
        <div class="staff-name">${escHtml(s.name)} ${isMe?'<span class="you-badge">Eu</span>':''}</div>
        <div class="staff-email">${escHtml(s.email)}</div>
        <div class="staff-meta">${s.role==='receptionist'?'🏨 Rececionista':'🧹 Limpeza'} · ${bLabel}</div>
      </div>
      ${!isMe?`<button class="btn-delete" onclick="confirmDeleteStaff('${s.uid}','${escHtml(s.name).replace(/'/g,"\\'")}')">✕</button>`:''}
    </div>`;
}

function buildNotes() {
  const withNotes = Object.values(rooms)
    .filter(r=>r.note&&r.note.trim())
    .sort(sortByNum);

  return `
    <div class="view-header">
      <div>
        <h1 class="view-title">Notas</h1>
        <p class="view-sub">${withNotes.length} quarto${withNotes.length!==1?'s':''} com nota</p>
      </div>
    </div>
    <div class="notes-page">
      ${withNotes.length===0?`
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <div class="empty-title">Ainda não há notas.</div>
          <p style="font-size:13px;color:var(--muted);">Abra qualquer quarto para adicionar uma nota.</p>
        </div>`:
        withNotes.map(r=>`
          <div class="note-card" onclick="openRoomModal('${r.id}')">
            <div class="note-card-header">
              <div class="note-room-label">Quarto ${escHtml(r.number)}</div>
              <span class="note-building-tag">Ed. ${r.building} · Piso ${r.floor}</span>

              <div class="note-card-meta">
                <span class="note-author-name">${escHtml(r.noteAuthor)}</span>
                ${r.noteUpdatedAt?formatTime(r.noteUpdatedAt):''}

            </div>
            <div class="note-card-text">${escHtml(r.note)}</div>
          </div>`).join('')}
    </div>`;
}
// ═══════════════════════════════
// BUILD — RELATÓRIO DIÁRIO
// ═══════════════════════════════
function buildReport() {
  const all       = Object.values(rooms);
  const total     = all.length;
  const cleaned   = all.filter(r => r.status === 'clean');
  const uncleaned = all.filter(r => r.status !== 'clean');
  const pct       = total ? Math.round(cleaned.length / total * 100) : 0;
  const today     = new Date().toLocaleDateString('pt-PT', {day:'2-digit', month:'2-digit', year:'numeric'});

  // Mapa uid → dados do staff
  const byStaff = {};
  cleaned.forEach(r => {
    if (!r.updatedBy) return;
    const member = staffList.find(s => s.uid === r.updatedBy && s.role === 'cleaning');
    if (!member) return;
    if (!byStaff[r.updatedBy]) byStaff[r.updatedBy] = { name: member.name, building: member.building, rooms: [] };
    byStaff[r.updatedBy].rooms.push(r);
  });
  const staffEntries = Object.entries(byStaff).sort((a,b) => b[1].rooms.length - a[1].rooms.length);

  const uidToName = {};
  staffList.forEach(s => { uidToName[s.uid] = s.name; });

  return `
    <div class="view-header">
      <div>
        <h1 class="view-title">Relatório Diário</h1>
        <p class="view-sub">${today}</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="generatePDF()">⬇ Exportar PDF</button>
      </div>
    </div>
    <div class="report-page">

      <div class="report-section-title">Resumo Geral</div>
      <div class="report-summary-grid">
        <div class="report-summary-card s-green">
          <div class="report-summary-label">Quartos Limpos</div>
          <div class="report-summary-val">${cleaned.length}</div>
          <div class="report-summary-sub">${pct}% do total</div>
        </div>
        <div class="report-summary-card s-red">
          <div class="report-summary-label">Por Limpar</div>
          <div class="report-summary-val">${uncleaned.length}</div>
          <div class="report-summary-sub">${100 - pct}% do total</div>
        </div>
        <div class="report-summary-card">
          <div class="report-summary-label">Total de Quartos</div>
          <div class="report-summary-val">${total}</div>
          <div class="report-summary-sub">Edifícios A + B</div>
        </div>
      </div>

      <div class="report-section-title">Desempenho por Funcionário</div>
      ${staffEntries.length === 0
        ? `<div class="empty-state" style="padding:30px 0;">
             <div class="empty-icon">👷</div>
             <div class="empty-title" style="font-size:13px;">Nenhum quarto foi marcado como limpo pela equipa ainda.</div>
           </div>`
        : `<div class="report-staff-grid">
            ${staffEntries.map(([uid, data]) => {
              const assigned = data.building === 'both' ? total : all.filter(r => r.building === data.building).length;
              const sp = assigned ? Math.round(data.rooms.length / assigned * 100) : 0;
              const roomTags = data.rooms.sort(sortByNum).map(r =>
                `<span style="display:inline-block;background:var(--cream2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;margin:1px 2px;font-size:10.5px;">${r.number}(${r.building})</span>`
              ).join('');
              return `
                <div class="report-staff-card">
                  <div class="report-staff-name">${escHtml(data.name)}</div>
                  <div class="report-staff-stat">Quartos limpos: <strong>${data.rooms.length}</strong></div>
                  <div class="report-staff-stat">Aproveitamento: <strong>${sp}%</strong></div>
                  <div class="report-bar-wrap"><div class="report-bar" style="width:${sp}%"></div></div>
                  <div class="report-staff-rooms">${roomTags || '—'}</div>
                </div>`;
            }).join('')}
          </div>`
      }

      <div class="report-section-title">Lista Completa de Quartos</div>
      <table class="report-table">
        <thead>
          <tr>
            <th>Quarto</th><th>Edifício</th><th>Tipo</th><th>Estado</th><th>Limpo por</th>
          </tr>
        </thead>
        <tbody>
          ${all.sort(sortByNum).map(r => {
            const isClean  = r.status === 'clean';
            const cleaner  = isClean && r.updatedBy ? (uidToName[r.updatedBy] || '—') : '—';
            return `<tr ${!isClean ? 'class="report-uncleaned"' : ''}>
              <td><strong>${escHtml(r.number)}</strong></td>
              <td>${r.building === 'A' ? 'Antigo' : 'Novo'}</td>
              <td>${escHtml(r.type)}</td>
              <td>${STATUS_LABEL[r.status]}</td>
              <td>${isClean ? escHtml(cleaner) : '<em>Por limpar</em>'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

function generatePDF() {
  const all     = Object.values(rooms);
  const total   = all.length;
  const cleaned = all.filter(r => r.status === 'clean');
  const uncl    = all.filter(r => r.status !== 'clean');

  const today   = new Date().toLocaleDateString('pt-PT', {day:'2-digit', month:'2-digit', year:'numeric'});
  const hora    = new Date().toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'});
  const hotel   = 'HI Serra da Estrela';

  const uidToName = {};
  staffList.forEach(s => { uidToName[s.uid] = s.name; });

  const byStaff = {};
  cleaned.forEach(r => {
    if (!r.updatedBy) return;
    const m = staffList.find(s => s.uid === r.updatedBy && s.role === 'cleaning');
    if (!m) return;
    if (!byStaff[r.updatedBy]) byStaff[r.updatedBy] = { name: m.name, building: m.building, rooms: [] };
    byStaff[r.updatedBy].rooms.push(r);
  });
  const staffEntries = Object.entries(byStaff).sort((a,b) => b[1].rooms.length - a[1].rooms.length);

  const staffHTML = staffEntries.length === 0
    ? '<p style="color:#6b7585;font-size:13px;">Nenhum quarto foi marcado como limpo pela equipa ainda.</p>'
    : staffEntries.map(([uid, data]) => {
        const assigned = data.building === 'both' ? total : all.filter(r => r.building === data.building).length;
        const sp = assigned ? Math.round(data.rooms.length / assigned * 100) : 0;
        const tags = data.rooms.sort(sortByNum).map(r =>
          `<span class="rtag">${r.number} (${r.building === 'A' ? 'Antigo' : 'Novo'})</span>`
        ).join(' ');
        return `
          <div class="scard">
            <div class="scard-header">
              <span class="sname">${data.name}</span>
              <span class="spct">${sp}% aproveitamento</span>
            </div>
            <div class="sbar-wrap"><div class="sbar" style="width:${sp}%"></div></div>
            <div class="sdetail">${data.rooms.length} quarto${data.rooms.length !== 1 ? 's' : ''} limpo${data.rooms.length !== 1 ? 's' : ''} de ${assigned} atribuídos</div>
            <div class="srooms">${tags}</div>
          </div>`;
      }).join('');

  const tableRows = all.sort(sortByNum).map(r => {

      <td>${r.type}</td>
      <td><span class="stag ${r.status}">${STATUS_LABEL[r.status]}</span></td>
      <td>${isClean ? cleaner : '<em>Por limpar</em>'}</td>
    </tr>`;
  }).join('');

  const html = `<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8">

// ═══════════════════════════════
// BUILD — TAREFAS LIMPEZA
// ═══════════════════════════════
function buildCleaningTasks() {
  const b   = currentUserData.building;
  const all = Object.values(rooms).filter(r=>b==='both'||r.building===b);
  all.sort((a,z)=>{
    if (a.priority!==z.priority) return a.priority?-1:1;
    return a.building.localeCompare(z.building)||a.number.localeCompare(z.number,undefined,{numeric:true});
  });
  const tasks = all.filter(r=>r.status==='dirty'||r.status==='cleaning');
  const prio  = tasks.filter(r=>r.priority);
  const norm  = tasks.filter(r=>!r.priority);
  const done  = all.filter(r=>r.status==='clean').length;
  const total = all.length;
  const pct   = total?Math.round(done/total*100):0;

  if (tasks.length===0) return `
    <div class="cleaning-progress">
      <div class="progress-header"><span>Progresso</span><span class="progress-pct">${done}/${total} (${pct}%)</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="all-done">
      <div class="all-done-icon">✨</div>
      <div class="all-done-title">Tudo limpo!</div>
      <div class="all-done-sub">Não há tarefas pendentes de momento.</div>
    </div>`;

  return `
    <div class="cleaning-progress">
      <div class="progress-header"><span>Progresso</span><span>${done}/${total} quartos limpos (${pct}%)</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${prio.length>0?`<div class="task-group-label priority-label">⚡ Prioridade — Check-in (${prio.length})</div>${prio.map(buildTaskCard).join('')}`:''}
    ${norm.length>0?`<div class="task-group-label">Pendentes (${norm.length})</div>${norm.map(buildTaskCard).join('')}`:''}`;
}

function buildTaskCard(r) {
  const hasNote = r.note && r.note.trim();
  return `
    <div class="task-card ${r.priority?'task-priority':''}">
      <div class="task-room-num">${escHtml(r.number)}<span class="task-building">Ed. ${r.building}</span></div>
      <div class="task-info">
        <div class="task-type">${escHtml(r.type)} · Piso ${r.floor}</div>
        ${r.priority&&r.priorityNote?`<div class="task-prio-note">⚡ ${escHtml(r.priorityNote)}</div>`:''}
        ${hasNote?`<div class="task-note-preview">📝 ${escHtml(r.note)}</div>`:''}
        <div class="task-status-badge ${r.status}">${STATUS_LABEL[r.status]}</div>
      </div>
      <div class="task-actions">
        <button class="task-btn btn-done" onclick="quickStatus('${r.id}','clean')">✓ Limpo</button>
        <button class="task-btn btn-nota" onclick="openRoomModal('${r.id}')">📝 Nota</button>
      </div>
    </div>`;
}

async function quickStatus(id, status) {
  try {
    await setRoomStatus(id, status);
    showToast(status==='clean'?'✅ Quarto marcado como limpo':'🧹 A limpar...');
  } catch(e) { showToast('❌ Erro ao atualizar','error'); }
}

// MODALS

function openModal(html) {
  const ov=document.getElementById('modal-overlay'), ct=document.getElementById('modal-container');
  if (!ov||!ct) return;
  ov.classList.remove('hidden'); ct.innerHTML=html;
}
function closeModal() {
  const ov=document.getElementById('modal-overlay'), ct=document.getElementById('modal-container');
  if (!ov||!ct) return;
  ov.classList.add('hidden'); ct.innerHTML='';
}

// MODAL DO QUARTO
function openRoomModal(id) {
  const r=rooms[id]; if (!r) return;
  const isRec  = currentUserData.role==='receptionist';
  const hasNote = r.note&&r.note.trim();

  openModal(`
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Quarto ${escHtml(r.number)} · Ed. ${r.building}</div>
        <button class="modal-close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-info">${escHtml(r.type)} · Piso ${r.floor}</div>

        <div class="modal-section-label">Estado</div>
        <div class="status-grid">
          ${['dirty','cleaning','clean','maintenance'].map(s=>`
            <button class="status-opt ${s} ${r.status===s?'selected':''}" onclick="handleQuickStatus('${id}','${s}')">
              ${STATUS_ICON[s]} ${STATUS_LABEL[s]}
            </button>`).join('')}
        </div>

        ${isRec?`
          <div class="modal-section-label">Prioridade Check-in</div>
          <label class="toggle-label">
            <input type="checkbox" id="prio-chk" ${r.priority?'checked':''} onchange="handlePrioToggle('${id}',this.checked)">
            <span>Marcar como prioridade check-in</span>
          </label>
          <input type="text" id="prio-note" class="form-input"
            placeholder="Ex: Check-in às 14h00"
            value="${escHtml(r.priorityNote||'')}" ${!r.priority?'disabled':''}
            style="margin-top:10px"
            onblur="if(document.getElementById('prio-chk')?.checked) savePrioNote('${id}')">
        `:''}

        <div class="modal-section-label">📝 Nota do quarto</div>
        ${hasNote?`
          <div class="current-note-box">
            <div class="current-note-label">Nota atual</div>
            <div class="current-note-text">${escHtml(r.note)}</div>
            <div class="current-note-by">✍️ ${escHtml(r.noteAuthor)}${r.noteUpdatedAt?' · '+formatTime(r.noteUpdatedAt):''}</div>
          </div>`:''}
        <div class="note-edit-area">
          <textarea id="note-input" class="note-textarea"
            placeholder="Escrever ou actualizar a nota… (Ctrl+Enter para guardar)">${hasNote?escHtml(r.note):''}</textarea>
          <div class="note-btns">
            <button class="btn-save-note" id="note-save-btn" onclick="handleSaveNote('${id}')">Guardar</button>
            ${hasNote?`<button class="btn-clear-note" onclick="handleClearNote('${id}')">Apagar</button>`:''}
          </div>
        </div>

        ${isRec?`
          <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border);">
            <button class="btn btn-danger" style="font-size:12.5px;padding:7px 12px;"
              onclick="confirmRemoveRoom('${id}','${escHtml(r.number)}')">🗑 Remover quarto</button>
          </div>`:''}
      </div>
    </div>`);

  document.getElementById('note-input')?.addEventListener('keydown', e => {
    if (e.key==='Enter'&&(e.ctrlKey||e.metaKey)) handleSaveNote(id);
  });
}

async function handleQuickStatus(id, status) {
  try { await setRoomStatus(id,status); closeModal(); showToast(`${STATUS_ICON[status]} ${STATUS_LABEL[status]}`); }
  catch(e) { showToast('❌ Erro ao atualizar','error'); }
}

async function handlePrioToggle(id, on) {
  const noteEl=document.getElementById('prio-note');
  if (noteEl) noteEl.disabled=!on;
  try { await setPriority(id,on,on?(noteEl?.value||''):''); showToast(on?'⚡ Prioridade ativada':'Prioridade removida'); }
  catch(e) { showToast('❌ Erro','error'); }
}

async function savePrioNote(id) {
  const noteEl=document.getElementById('prio-note'); if (!noteEl) return;
  try { await setPriority(id,true,noteEl.value); } catch(e) { /* silent */ }
}

async function handleSaveNote(roomId) {
  const input=document.getElementById('note-input');
  const btn  =document.getElementById('note-save-btn');
  const text =(input?.value||'').trim();
  if (!text) { showToast('⚠️ Escreva uma nota antes de guardar.','error'); return; }
  if (btn) { btn.disabled=true; btn.textContent='A guardar...'; }
  try { await setNote(roomId,text); closeModal(); showToast('📝 Nota guardada'); }
  catch(e) { showToast('❌ Erro ao guardar a nota','error'); if(btn){btn.disabled=false;btn.textContent='Guardar';} }
}

async function handleClearNote(roomId) {
  try { await setNote(roomId,''); closeModal(); showToast('🗑 Nota removida'); }
  catch(e) { showToast('❌ Erro ao remover a nota','error'); }
}

async function handleAddRoom(b) {
  const num  =(document.getElementById('ar-num')?.value||'').trim();
  const floor= document.getElementById('ar-floor')?.value||'';
  const type = document.getElementById('ar-type')?.value||'Standard';
  const btn  = document.getElementById('ar-btn');
  const err  = document.getElementById('ar-err');
  if (!num||!floor) { showErr(err,'Preencha o número e o piso.'); return; }
  btn.disabled=true; btn.textContent='A adicionar...';
  try { await addRoom(b,num,floor,type); closeModal(); showToast(`✅ Quarto ${num} adicionado ao Edifício ${b}`); }
  catch(e) { showErr(err,e.message); btn.disabled=false; btn.textContent='Adicionar'; }
}

// ═══════════════════════════════
// HELPERS
// ═══════════════════════════════
function setFilter(type,val) {
  if (type==='status') filterStatus=val;
  if (type==='floor')  filterFloor=val;
  renderMainContent();
}

function showToast(msg,type='success') {
  const wrap=document.getElementById('toast-container'); if (!wrap) return;
  const t=document.createElement('div');
  t.className=`toast toast-${type}`; t.textContent=msg;
  wrap.appendChild(t);
  setTimeout(()=>{ t.classList.add('fade-out'); setTimeout(()=>t.remove(),400); },3000);
}

function showErr(el,msg) {
  if (!el) return; el.textContent=msg; el.classList.remove('hidden');
}

function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function capitalize(s) { return s?s.charAt(0).toUpperCase()+s.slice(1):s; }

function sortByNum(a,b) {
  return a.building.localeCompare(b.building)||a.number.localeCompare(b.number,undefined,{numeric:true});
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    const d   =ts.toDate?ts.toDate():new Date(ts);
    const diff=Math.floor((Date.now()-d.getTime())/1000);
    if (diff<60)    return 'agora mesmo';
    if (diff<3600)  return `há ${Math.floor(diff/60)}min`;
    if (diff<86400) return `há ${Math.floor(diff/3600)}h`;
    return d.toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit'});
  } catch(e) { return ''; }
}
